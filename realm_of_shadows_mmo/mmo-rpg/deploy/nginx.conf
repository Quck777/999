server {
    listen 80;
    listen [::]:80;
    server_name realm-of-shadows.local;  # Замените на ваш домен

    # Редирект HTTP → HTTPS (для production)
    # return 301 https://$server_name$request_uri;

    root /var/www/mmo-rpg/public;
    index index.php index.html;

    charset utf-8;

    # Логи
    access_log /var/log/nginx/mmo-rpg-access.log;
    error_log  /var/log/nginx/mmo-rpg-error.log;

    # Безопасность — скрыть скрытые файлы (.env, .git и т.д.)
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Запретить доступ к конфигурационным файлам
    location ~* \.(env|sql|log|md|json|lock|yml|yaml)$ {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Запретить доступ к backend-папкам
    location ~ ^/(storage|logs|config|app|database)/ {
        deny all;
    }

    # Запретить прямой доступ к PHP-файлам (кроме index.php)
    location ~* \.php$ {
        deny all;
        access_log off;
        log_not_found off;
    }

    # PHP-FPM обработка — ТОЛЬКО для index.php
    location = /index.php {
        fastcgi_pass unix:/var/run/php/php8.2-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;

        # Безопасность PHP
        fastcgi_param PHP_VALUE "
            display_errors = Off
            log_errors = On
            upload_max_filesize = 2M
            post_max_size = 8M
            memory_limit = 128M
            max_execution_time = 30
            session.cookie_httponly = 1
            session.cookie_secure = 1
            session.use_strict_mode = 1
        ";

        # Таймауты для боёв (длинные запросы)
        fastcgi_read_timeout 120;
    }

    # SPA fallback — все запросы к несуществующим файлам → index.html
    # В dev-режиме (без PHP) nginx отдаст статический index.html
    # В production-режиме (с PHP) запрос пойдёт через try_files → index.php
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Статические файлы — кэширование
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Ограничение размера запросов
    client_max_body_size 8M;
    client_body_timeout 60s;

    # Защита от clickjacking
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self'; font-src 'self';" always;

    # Gzip сжатие
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript text/xml;

    # Rate limiting (базовый)
    # limit_req_zone $binary_remote_addr zone=api:10m rate=30r/m;
    # limit_req zone=api burst=10 nodelay;
}

